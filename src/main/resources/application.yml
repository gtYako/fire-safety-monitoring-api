spring:
  # Настройки подключения к PostgreSQL, который поднимается через docker compose.
  datasource:
    url: jdbc:postgresql://localhost:5432/fire_safety_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  # Порт, на котором запускается REST API и Swagger.
  port: 8080

jwt:
  # Секрет нужен для подписи JWT. Можно переопределить через переменную JWT_SECRET.
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

telegram:
  # Токен и chat_id берутся из переменных окружения перед запуском приложения.
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:856994240}

app:
  upload-dir: ${UPLOAD_DIR:uploads}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.firesafety: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/fire-safety.log
